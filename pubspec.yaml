name: my_digital_wellbeing
description: A personal digital wellbeing tracker for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # App Usage Tracking
  usage_stats: ^1.0.0

  # Call & SMS
  call_log: ^4.0.2
  flutter_sms_inbox: ^1.0.4

  # Background Tasks
  workmanager: ^0.5.2

  # Charts
  fl_chart: ^0.68.0

  # Database
  drift: ^2.20.0
  drift_flutter: ^0.2.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Permissions
  permission_handler: ^11.3.1

  # DI
  get_it: ^7.7.0

  # Navigation
  go_router: ^14.2.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
